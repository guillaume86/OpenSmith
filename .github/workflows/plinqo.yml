name: Plinqo CI

on:
  push:
    branches: [master]
    paths:
      - "plinqo/**"
      - "NuGet.config"
    tags:
      - "plinqo/v*"
  pull_request:
    branches: [master]
    paths:
      - "plinqo/**"
      - "NuGet.config"

jobs:
  ci:
    uses: ./.github/workflows/dotnet-ci.yml
    with:
      solution-path: plinqo/OpenSmith.Plinqo.slnx
      tag-prefix: plinqo/v
      pack-projects: |
        plinqo/src/OpenSmith.Plinqo/OpenSmith.Plinqo.csproj
      extra-pack-args: -p:UseLocalProjects=false
    secrets:
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}
